<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>The Revive Project</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f5f3ee;
    --fg: #1c1917;
    --faint: #a8a29e;
    --ghost: #d6d3cd;
    --rule: #e0ddd7;
    --mono: 'DM Mono', monospace;
  }

  html, body { height: 100%; }
  body { background: var(--bg); color: var(--fg); font-family: var(--mono); -webkit-font-smoothing: antialiased; }
  ::selection { background: var(--fg); color: var(--bg); }
  a { color: inherit; text-decoration: none; }

  .page {
    min-height: 100vh;
    display: grid;
    justify-items: center;
    align-content: start;
    padding: 6rem 2.5rem 3rem;
    position: relative;
  }

  .inner { width: 100%; max-width: 620px; }
  .inner.inner--gallery { max-width: 780px; }
  .inner.inner--wide { width: 90vw; max-width: 800px; }

  .decode-para {
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 2.1;
    white-space: pre-wrap;
    color: var(--fg);
    letter-spacing: 0.02em;
    cursor: crosshair;
    margin-bottom: 1.4em;
    font-weight: 300;
  }

  .decode-para .bold { font-weight: 400; }

  .decode-para:last-of-type { margin-bottom: 0; }

  .tail {
    margin-top: 2.5rem;
    opacity: 0;
    transition: opacity 1s ease;
  }

  .tail.show { opacity: 1; }

  .tail-rule {
    width: 36px; height: 1px;
    background: var(--rule);
    margin-bottom: 1.2rem;
  }

  .tail-links {
    display: flex; gap: 2rem;
  }

  .tail-links a {
    font-family: var(--mono);
    font-size: 8.5px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--faint);
    transition: color 0.25s;
    cursor: pointer;
  }

  .tail-links a:hover { color: var(--fg); }
  .tail-links a.active { color: var(--fg); }

  /* ── Writing list ── */
  .post-item {
    display: block;
    padding: 0.5rem 0;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 12.5px;
    transition: color 0.25s;
    color: var(--faint);
  }

  .post-item:hover { color: var(--fg); }

  .post-title { display: inline; }
  .post-title span { display: none; }

  /* ── Gallery ── */
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-auto-rows: 1fr;
    gap: 0.35rem;
    width: 100%;
    max-width: 780px;
  }

  .gallery-img {
    width: 100%;
    aspect-ratio: 3 / 2;
    object-fit: cover;
    display: block;
    filter: grayscale(0.8) contrast(0.9);
    opacity: 0;
    transition: filter 0.5s ease, opacity 0.8s ease;
  }

  .gallery-img.show { opacity: 1; }
  .gallery-img:hover { filter: grayscale(0) contrast(1); }

  /* ── Back arrow ── */
  .back-arrow {
    font-family: var(--mono);
    font-size: 8.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--faint);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    margin-bottom: 2rem;
    transition: color 0.25s, gap 0.25s;
  }

  .back-arrow:hover { color: var(--fg); gap: 0.6rem; }

  /* ── Placeholder pages ── */
  .placeholder-msg {
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--faint);
    line-height: 2.1;
  }

  /* ── Revive-Romeyka ── */
  .romeyka-page { width: 100%; max-width: 800px; }
  .romeyka-header {
    margin-bottom: 2rem;
  }
  .romeyka-header h1 {
    font-family: var(--mono); font-size: 13px; font-weight: 300;
    letter-spacing: 0.14em; margin-bottom: 0.2rem;
    text-transform: uppercase;
  }
  .romeyka-header .subtitle {
    font-family: var(--mono); font-size: 10px; color: var(--faint);
    letter-spacing: 0.04em; font-weight: 300; font-style: italic;
  }

  /* Two-column layout */
  .romeyka-layout {
    display: flex; gap: 2.5rem; align-items: flex-start;
    width: 100%;
  }

  /* Left nav */
  .romeyka-nav {
    flex: 0 0 150px; position: sticky; top: 3rem;
  }
  .romeyka-nav-item {
    display: block; padding: 0.45rem 0;
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.04em; color: var(--ghost);
    cursor: pointer; transition: color 0.25s;
    user-select: none; border: none; background: none;
    text-align: left; width: 100%;
  }
  .romeyka-nav-item:hover { color: var(--fg); }
  .romeyka-nav-item.active { color: var(--fg); }
  .romeyka-nav-item .nav-num {
    display: inline-block; width: 1.4em;
    font-size: 8.5px; letter-spacing: 0.08em;
    color: inherit; opacity: 0.5;
  }
  .romeyka-nav-item.active .nav-num { opacity: 1; }
  .romeyka-nav-rule {
    width: 20px; height: 1px; background: var(--rule);
    margin: 0.6rem 0;
  }

  /* Right content pane */
  .romeyka-content {
    flex: 1; min-width: 0; min-height: 50vh;
    border-left: 1px solid var(--rule);
    padding-left: 2.5rem;
    width: 0; /* force flex-basis so width is stable */
  }
  .romeyka-content-inner {
    transition: opacity 0.15s ease;
    width: 100%;
  }

  /* Section title in content */
  .romeyka-sec-title {
    font-family: var(--mono); font-size: 11px; font-weight: 400;
    letter-spacing: 0.08em; margin-bottom: 1.2rem;
    text-transform: uppercase; color: var(--fg);
  }

  /* Subsections */
  .romeyka-sub { margin-bottom: 1.4rem; }
  .romeyka-sub h3 {
    font-family: var(--mono); font-size: 9px; font-weight: 400;
    letter-spacing: 0.1em; color: var(--faint); margin-bottom: 0.5rem;
    text-transform: uppercase;
  }
  .romeyka-p {
    font-family: var(--mono); font-size: 11px; line-height: 1.95;
    color: var(--fg); margin-bottom: 0.6rem; font-weight: 300;
  }

  /* Glossed examples */
  .gloss-block {
    border-left: 2px solid var(--rule);
    padding: 0.5rem 0 0.5rem 0.9rem; margin: 0.7rem 0;
    font-family: var(--mono); font-size: 10.5px; line-height: 1.85;
    overflow-x: auto;
  }
  .gloss-block .gloss-num {
    color: var(--ghost); font-size: 9px; margin-right: 0.3rem;
    font-weight: 400; letter-spacing: 0.05em;
  }
  .gloss-block .gloss-line { white-space: pre; color: var(--fg); font-weight: 300; }
  .gloss-block .gloss-line:nth-child(even) { color: var(--faint); font-size: 9.5px; }
  .gloss-block .gloss-trans {
    color: var(--faint); font-style: italic; margin-top: 0.15rem; font-size: 10.5px;
  }
  .gloss-block .gloss-src { font-size: 8.5px; color: var(--ghost); margin-top: 0.1rem; }

  /* Tables */
  .romeyka-table {
    width: 100%; border-collapse: collapse; margin: 0.7rem 0;
    font-family: var(--mono); font-size: 10px;
  }
  .romeyka-table th {
    text-align: left; padding: 0.4rem 0.5rem;
    border-bottom: 1px solid var(--fg);
    font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase;
    font-size: 8.5px; color: var(--faint);
  }
  .romeyka-table td {
    padding: 0.35rem 0.5rem; border-bottom: 1px solid var(--rule);
    color: var(--fg); font-weight: 300;
  }
  .romeyka-table tbody tr { transition: background 0.15s; }
  .romeyka-table tbody tr:hover { background: rgba(28, 25, 23, 0.025); }

  /* Notes */
  .romeyka-note {
    font-family: var(--mono); font-size: 10px; color: var(--faint);
    line-height: 1.75; margin: 0.5rem 0; font-weight: 300;
  }

  /* Typological comparison */
  .typo-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 0;
  }
  .typo-grid:first-of-type { margin-top: 0.6rem; }
  .typo-cell {
    padding: 0.45rem 0.5rem; border-bottom: 1px solid var(--rule);
    font-family: var(--mono); font-size: 10px; text-align: center;
  }
  .typo-cell .typo-label {
    font-size: 8px; color: var(--faint); text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .typo-cell .typo-val { color: var(--fg); font-weight: 300; }
  .typo-cell.highlight { background: rgba(28, 25, 23, 0.035); }

  /* Decode shimmer for content transitions */
  .romeyka-decode-char {
    display: inline; font-family: var(--mono);
    color: var(--ghost); transition: color 0.1s;
  }

  /* ── Research ── */
  .research-caption {
    font-family: var(--mono); font-size: 8.5px; font-weight: 300;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--faint); margin-bottom: 1rem;
  }
  .research-item {
    display: block;
    padding: 0.4rem 0;
    font-family: var(--mono); font-size: 12.5px;
    color: var(--fg); transition: color 0.25s;
  }
  .research-item-meta {
    font-size: 10px; margin-top: 0.1rem;
    color: var(--ghost);
  }

  @media (max-width: 640px) {
    .page { padding: 2rem 1.5rem; }
    .decode-para { font-size: 11px; }
    .tail-links { gap: 1.2rem; flex-wrap: wrap; }
    .tail-links a:not([data-page="home"]) { display: none; }
    .post-item { grid-template-columns: 50px 1fr; }
    .gallery-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>

<script>
const alpha = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';

let currentPage = null;
let transitioning = false;

// ── Pages ──

const pages = {
  home: {
    paragraphs: [
      "**The Revive Project** — Language makes us human. The Project is an effort to decode, preserve, and revitalize endangered, extinct, and minority languages with new computational methods and artificial intelligence.",
      "Over 7,000 languages are spoken around the world, yet every two weeks, one is lost in a deafening silence. A projected 90% could disappear by century's end. This crisis is interconnected with broader challenges, from climate change to political oppression to globalization. Reviving language is reviving the history, knowledge, and art it holds.",
      "At the same time, the rise of technology holds potential for influence. But artificial intelligence algorithms are data-hungry. We utilize and develop low-data models that can advance linguistic documentation as well as improve the global equity in the communities that powerful technologies can service.",
      "The Revive Project works with communities directly. We\u2019ve collected >500mins of language data, built low-data artificial intelligence models, decoded and documented endangered languages, and published technical and linguistic research.",
    ],
  },

  writing: {
    posts: [
      { id: 'p7', title: 'How to Decode a Language' },
      { id: 'p1', title: 'The Toolbox' },
      { id: 'p2', title: 'The Matrix Language Frame Model' },
      { id: 'p3', title: 'Philosophy of Language' },
      { id: 'p4', title: 'A Brief History of Romeyka' },
      { id: 'p5', title: 'Why Languages Die' },
      { id: 'p6', title: 'To Save Our World, We Need to Save Our Languages' },
    ],
  },

  post: {
    p7: { title: 'How to Decode a Language', paragraphs: [
      "**1. Frequencies** \u2014 Nearly all human language holds the statistical property of Zipf\u2019s law. The most frequent word appears about twice as often as the second most frequent, three times as often as the third, and so on. In English, the word \u201cthe\u201d alone accounts for nearly 7% of all word occurrences, and this distribution appears across languages like Mandarin, Swahili, Turkish, and even undeciphered texts like the Voynich Manuscript. Zipf believed it reflected a tension between speakers wanting efficiency and listeners needing clarity. Knowledge comes in frequency. The most common tokens in any language are almost certainly grammatical: articles, conjunctions, prepositions.",
      "**2. Contexts** \u2014 Words gain meaning from their contexts. Words that appear near each other repeatedly across many sentences are often related. A token that consistently precedes a certain class of other tokens may function as a preposition or a determiner; two words that never occupy the same position may belong to the same grammatical category, competing for the same slot. The internal structure of a language can be revealed in tracking what co-occurs, what substitutes for what, and what never appears together.",
      "**3. Parallel Co-occurrences** \u2014 With parallel data, it becomes possible to align words across the two. This is the core principle of the Rosetta Stone. Co-occurrences of units across translations are likely translations, and this holds even when the translations are imperfect or partial. Solving for the dependencies in a complex web of co-occurrence directly helps decode the language. When scholars first encountered the Rosetta Stone in 1799, they believed it would take weeks to decipher; it took Champollion over twenty years. His breakthrough came from noticing that certain hieroglyphs appeared inside oval cartouches wherever the Greek text mentioned \u201cPtolemy.\u201d",
      "**4. Linguistic Universals** \u2014 Human languages, across all their diversity, share deep structural regularities. In 1963, Joseph Greenberg published 45 universals of grammar: subjects almost always precede objects, conditional clauses precede their conclusions, languages with prepositions almost always place the genitive after the noun. Morris Swadesh compiled a list of roughly 100 concepts present in every known language, things like water, fire, mother, die, and sun, so fundamental that no community has ever lacked a term for them. These shared properties point to constraints in the human language faculty, the basic cognitive structure that shapes what kinds of languages humans can learn and produce. These regularities serve as priors in decoding.",
      "**5. Self-Consistency** \u2014 Decoding a language means putting together different, incomplete results. Solving the puzzle is converging to a consistent solution that explains the whole. Identify the roles, relationships, meanings, and constraints of linguistic elements, and together, where they agree, we find an answer. Decoding a language is, at its core, pattern hunting and exploration.",
    ]},
    p1: { title: 'The Toolbox', paragraphs: [
      "I kneel beside my dede (\"grandfather\") as he gently swings his hammer, lightly tapping a nail into the wooden cabinet through three different motions (\"d\u0101cede, \u0101:cede, mu\u0101cede,\"), demonstrating as he recites each word. I\u2019m visiting his dusty village house along the shores of the Black Sea, eagerly listening to his instructions for tackling the kitchen repair.",
      "Beyond the physical tools he\u2019s holding, he\u2019s also pulling from his linguistic toolbox. My dede speaks one of Turkey\u2019s many minority languages and is explaining how you can express the simple action of hammering a nail in various different ways. What is simply \"hammering\" in English becomes d\u0101cede (\"hammering in front of oneself\"), \u0101:cede (\"hammering above oneself\"), and mu\u0101cede (\"hammering from behind the nail\") in G\u00FCrc\u00FC. Learning these intricacies and concepts of relative spatiality in verbs was beyond what my mind could even comprehend; however, through my dede, I began to see new ways to communicate beyond my knowledge of just Turkish and English. With each new G\u00FCrc\u00FC word, I added to my lexicon as well as my perception.",
      "These fascinating conversations have always been the highlight of my sporadic visits to Turkey and sparked my interest in linguistics. My dede also reveled in my curiosity, frequently teaching new words and phrases to his best student. No one else in our family spoke G\u00FCrc\u00FC. It had never been passed down to my parents. This was no choice; language suppression was a central part of the government\u2019s aim in seeking control. Through an intense history of programs and bans that enforced one language of supremacy (Turkish), the Turkish state not only demonized the proliferation of other languages and dialects but also prevented diverse thinking and public opinion that diverged from the ruling beliefs.",
      "This destructive dominance has precluded me from accessing the rich cultures of my heritage. There is a broad range of languages in my family, from G\u00FCrc\u00FC to Kurdish to Laz. The patterns in my family are a part of a much greater trend in the loss of the world\u2019s linguistic diversity. Around the world, there are over 7000 more diverse languages holding their own unique knowledge and significance, yet 90% of them are predicted to disappear within the century. As dominant languages form linguistic hierarchies of social, economic, and digital power, minority languages \u2014 and their identities and knowledge \u2014 become lost in deafening silence.",
      "The inequality of AI language technologies only exacerbates this digital and economic divide in world cultures. While AI algorithms have grown rapidly and are becoming more capable, these advancements are primarily English-centric with the disparities in data availability and the algorithms\u2019 data inefficiency. Thus, they serve different communities disproportionately. Yet it is obvious with the current growth of AI that access to these top tools will become the key to global power and opportunities. Thus minority language speakers are forced to abandon their cultures towards the utility of dominant languages or be left in the dust. With the acceleration of unequal AI, we also accelerate the death of our cultures and humanity itself.",
      "These languages are easily forgotten. I argue that diverse language hold a functional value with \u2018linguistic relativism\u2019 and the creativity they enable with their unique views and knowledge embedded in the language. Yet it is a fact that a language deserves to exist simply because it is a beauty and art of humanity. AI may be unequal right now, but it also has so much potential to support diverse cultures as well, with potential for large scale preservation, documentation, and tools of empowerment. With each voice it can reach, we add creative, innovative views of the world to our linguistic toolbox.",
    ]},
    p2: { title: 'The Matrix Language Frame Model', paragraphs: [
      "The theoretical framework of Myers Scotton\u2019s (1993) Matrix Language Frame model (MLF) is central to understanding languages in contact and their trajectory. The Matrix Language turnover hypothesis, a component of MLF, delves into the general morphosyntactic structures observed in bilingual speech. It specifically examines structural borrowing in the context of language attrition, indicating that the borrowing of inflections and function words may pose a risk for language attrition.",
      "Expanding on the principles of MLF, two auxiliary theories come into play: the 4-M model and the Abstract Level model. The 4-M model explores the distribution of various morphemes in language production, shedding light on how they are utilized in bilingual speech. On the other hand, the Abstract Level model takes into account features from different language varieties and explores how utterances are structured in a state of convergence.",
      "Within the Abstract Level model, Myers distinguishes between classic codeswitching and composite codeswitching. Classic codeswitching involves the morphosyntactic frame being solely derived from the Matrix Language (ML). However, content morphemes, such as nouns, verbs, adjectives, and prepositions, can be inserted from the other participating language, known as the Embedded Language (EL). In contrast, composite codeswitching occurs when the morphosyntactic frame is influenced by both participating languages, resulting in the incorporation of grammatical structures from the EL.",
      "The MLF model\u2019s explanations of complex language contact phenomena among bilingual speakers rely on a hierarchy of contact and borrowing. The borrowing scale proposed by Thomason and Kaufman in 1988 delineates the degree of grammar\u2019s resistance to borrowing based on systematic factors. It encompasses levels of contact, ranging from casual to intense, and highlights the resulting changes in the EL.",
      "Studying such patterns in language presents important information regarding the paths of languages from the past through the future.",
    ]},
    p3: { title: 'Philosophy of Language', paragraphs: [
      "The protection of linguistic diversity in a world that continues to grow more interconnection sustains the depth of significance held by languages. Beyond functional communication, languages hold immense philosophical and cultural significance. They hold powerful and enriching information, preserving rich histories, traditions, and knowledge. With the scale and complexities of the problem of language endangerment, the reasons for protecting languages become quite simple. It comes down to humanity and the basic recognition of ethics and practicality.",
      "Language is not merely a tool for communication; it is a reflection of the human spirit. Language represents the soul of a culture, the foundation upon which customs and identities are built. By preserving linguistic diversity, we honor the inherent value of each language and affirm our commitment to respecting all ways of viewing the world.",
      "Winston Churchill\u2019s analogy about preserving art and culture during times of war captures the philosophy of protecting diverse languages. If we set aside our humanity, if we destroy a museum of cultural artifacts, what are we fighting for? Like a museum, languages hold within them a wealth of information, insights, and perspectives that deserve preservation and appreciation.",
      "While philosophical reasons highlight the intrinsic worth of languages, functional considerations underline the tangible benefits of language preservation. Language is not just a medium of communication; it is a vessel for knowledge. With the loss of a language, you also lose a lot of information about a whole society from which you can gather. This can include things like local botany, medicine, or geography.",
      "Preserving linguistic diversity is a simple philosophical and functional imperative. In a rapidly globalizing world, the importance of maintaining linguistic diversity cannot be overstated. It is a conscious choice to reject homogeneity and embrace the richness that emerges from linguistic variations.",
    ]},
    p4: { title: 'A Brief History of Romeyka', paragraphs: [
      "Romeyka holds within it the echoes of ancient civilizations, colonization, and the enduring cultural heritage of its speakers. This article delves into the comprehensive history and development of Romeyka, tracing its origins, evolution, and the intricate influences that have shaped it over time.",
      "Understanding the roots of Romeyka starts from ancient times, when Asia Minor was home to a mosaic of languages, from Hittite, Phrygian, and Lydian to numerous other local languages. With the advent of Greek colonization, however, there became a shift as the Greek language gained prominence and cultural dominance. Soon, most communities in the region had converted to the Greek language and way of living.",
      "As Greek colonies flourished and spread across Asia Minor, the Greek spoken in various regions began to evolve independently from Classical Greek. The formation of dialects across Cappadocia and Pontus differentiated from the standardized forms of Greek spoken in major centers like Athens or Constantinople. The first colonies settling by the coast of the Black Sea spoke Pontic Greek.",
      "Then, with the Turkic invasion, the region experienced the introduction of another dominant culture, language contact leaving an indelible mark on the Greek dialects of Asia Minor. Yet, the Pontus region was more unique. Reached by the Turkish later and with geographical factors from mountains and high villages, there was less interaction with the Turkish speakers. This isolation and limited contact shaped the trajectory of the dialect, as it retained more archaic features from the old form of Greek.",
      "Then, with the end of the Turkish war of independence in the early 1900\u2019s, the Treaty of Lausanne decided on an exchange of populations. This was based on religion; Christians residing in the formed Turkish republic would move to the new Greek Kingdom, and Muslims residing in the Greek Kingdom would move to Turkey. Small enclaves of Muslim Pontic Greek speakers remained in Turkey, while the majority of other Greek speakers left.",
      "The remaining of these Muslim Pontic speakers in Turkey meant that, unlike others who were largely influenced by Standard Greek and assimilated to the modern form, the language developed on its own without heavy Greek influence. It exhibited unique linguistic features akin to Ancient Greek lost from any other Greek dialect. And, with the passage of time, contact with languages such as Turkish and Armenian introduced elements that resulted in unique linguistic innovations.",
      "Today, this form of the Pontic Greek dialect spoken in Turkey is known as Romeyka; differentiating from other languages and its features reflecting a complex history of cultural interactions.",
    ]},
    p5: { title: 'Why Languages Die', paragraphs: [
      "A language\u2019s vitality is influenced by countless factors and complex circumstances accumulating over time. Addressing these conditions towards the sustenance and revival of a language\u2019s continuity is challenging and requires a comprehensive approach. Understanding the problem from its roots and working to resolve them is crucial.",
      "Dr. Metin Ba\u011Fr\u0131a\u00E7\u0131k, professor of linguistics at Bogazici University, states that \"if you leave languages to their own fate, they\u2019ll survive.\" It\u2019s the manipulation of the purpose of language, its artificial intertwining with social structures, prestige and power, that damage their trajectory. The problem comes with intervention, with an asserted language of dominance enforced into every aspect of a community.",
      "With this power of a language in politics, economics, education, other languages become positioned as a disadvantage. This belief, taking root within communities, harms from within. People begin to, out of necessity for the sake of survival and success in a system propelling homogeneity, actively and deliberately refuse their language. Viewing it as hardship, they avoid teaching the language to their children.",
      "To counter this, what is needed is keeping dominant languages under control so that it doesn\u2019t penetrate into the functional domains of minority languages. While a language may hold role in official or formal areas, it is essential to maintain the function of minority languages as well, whether it is as a function of the village, of the media, of the community, or beyond. Allow it to thrive and grow in village schools where local languages are taught, or in radio and television programs that bring inclusivity, in cultural practices and music.",
      "The continuity of languages across generations is essential in language preservation. Its education in children is important, and action to help pass down language and culture is needed first and foremost, for the vitality of languages. Materials and media towards creating a greater awareness and presence about these languages through publications and documentaries can be valuable to support preservation.",
      "It requires a collaboration of communities, of speakers of minority languages, of institutions in government, academia, and media, of individuals around the world and every one of us, to achieve this. A voice is a right, and the only real way to change starts with embracing diversity and respecting, valuing the space for the cultures and identities that enable creativity flourishing.",
    ]},
    p6: { title: 'To Save Our World, We Need to Save Our Languages', paragraphs: [
      "Climate change. The pandemic. Inflation. The current world faces countless issues. Yet, almost unheard of is the threat upon what is perhaps the most distinguishably human quality central to every part of our lives: language. Languages are being lost at an alarming rate, and with them, human culture and knowledge. Addressing the most pressing problems requires bringing together different backgrounds and unique perspectives. It will take making every voice heard to begin to heal the loss of humanity.",
      "The \"language crisis\" \u2014 the rapid extinction of world languages \u2014 has a huge impact on global communities. There are over 7,000 languages spoken around the world, yet this diversity is fragile; every two weeks, a language disappears, and there will be a projected 90% of languages gone by the end of the century. The danger only spreads, as the cultures, knowledge and identities are lost in a deafening silence.",
      "The death of a language is a lot more than losing words. The way we speak reflects the values and knowledge of society. We express ourselves and our surroundings through language and form a reciprocal influence between who we are and what we speak. The ways in which a language addresses gender, time, age and more play a role in shaping our perspectives and beliefs.",
      "The Kuuk Thaayorre, an Aboriginal tribe in Australia, for example, describes directions with respect to the four cardinal directions. This influences their interpretation of their spatial positioning, perhaps in ways that lack the detachment that the term \"that\" often assumes in English.",
      "When a language dies, its blood is on our hands. The main reasons lie in cultural marginalization and the desire for one language of power. Globalization represses native languages. English, for instance, with its economic and political power, has quickly risen to dominate worldwide. Language is a system of communication, but in hierarchical societies, language suddenly takes a symbol of class and superiority.",
      "This causes the language crisis to become intertwined with the climate crisis. It is native communities that have had to endure the greatest impacts of the climate crisis, with many forced into new and urban areas in the last 30 years. These individuals face conflict to fit into social hegemony and grow to learn only the language dominant in the region they reside in.",
      "Language is an integral part of our daily lives. Acting fast is crucial. Right now, the critical overlap of declining languages and emerging digital technologies brings potential for change in documenting and promoting heritage. Mass communication through media provides a platform for sharing these unique voices, and computation is enabling the deployment of tools that were never before accessible.",
      "But true change comes from within society, from the actions of each individual. Embracing diversity and exploring the different backgrounds right around us in our own communities is the first step to strengthening cultures. Humanity holds the power to create, destroy and save, and it is up to us, now, to preserve the languages that have shaped us.",
    ]},

// ── Justify ──

function justify(text, width) {
  const words = text.split(' ');
  const lines = []; let cur = [], curLen = 0;
  words.forEach(w => {
    if (curLen + w.length + (cur.length ? 1 : 0) > width) {
      lines.push(cur); cur = [w]; curLen = w.length;
    } else { if (cur.length) curLen++; cur.push(w); curLen += w.length; }
  });
  if (cur.length) lines.push(cur);
  return lines.map((words, li) => {
    if (li === lines.length - 1) return words.join(' ').padEnd(width);
    const tLen = words.reduce((s, w) => s + w.length, 0);
    const gaps = words.length - 1;
    if (!gaps) return words[0].padEnd(width);
    const total = width - tLen, base = Math.floor(total / gaps);
    let extra = total - base * gaps, line = '';
    words.forEach((w, i) => {
      line += w;
      if (i < gaps) { let sp = base; if (extra > 0) { sp++; extra--; } line += ' '.repeat(sp); }
    });
    return line;
  });
}

// Justify with a figure cutout on the right
// fig: { icon: '◎', lines: 3 } — reserves 8 chars on right for first N lines
function justifyWithFigure(text, width, fig) {
  const inset = 8;
  const narrowW = width - inset;
  const words = text.split(' ');

  // Word-wrap with variable line width
  const rawLines = []; // each: { words: [], width: number }
  let cur = [], curLen = 0, lineIdx = 0;
  const getW = (li) => li < fig.lines ? narrowW : width;

  words.forEach(w => {
    const lw = getW(lineIdx);
    if (curLen + w.length + (cur.length ? 1 : 0) > lw) {
      rawLines.push({ words: cur, width: getW(lineIdx) });
      lineIdx++;
      cur = [w]; curLen = w.length;
    } else {
      if (cur.length) curLen++;
      cur.push(w); curLen += w.length;
    }
  });
  if (cur.length) rawLines.push({ words: cur, width: getW(rawLines.length) });

  // Justify each line
  const result = rawLines.map((rl, li) => {
    const isLast = li === rawLines.length - 1;
    const w = rl.width;
    const ws = rl.words;
    let justified;

    if (isLast) {
      justified = ws.join(' ').padEnd(w);
    } else {
      const tLen = ws.reduce((s, word) => s + word.length, 0);
      const gaps = ws.length - 1;
      if (!gaps) { justified = ws[0].padEnd(w); }
      else {
        const total = w - tLen, base = Math.floor(total / gaps);
        let extra = total - base * gaps; justified = '';
        ws.forEach((word, i) => {
          justified += word;
          if (i < gaps) { let sp = base; if (extra > 0) { sp++; extra--; } justified += ' '.repeat(sp); }
        });
      }
    }

    // Append figure area for narrow lines
    if (li < fig.lines) {
      const iconLine = Math.floor(fig.lines / 2); // center icon vertically
      if (li === iconLine) {
        justified += '   ' + fig.icon + '    ';
      } else {
        justified += ' '.repeat(inset);
      }
    }

    return justified;
  });

  return result;
}

// ── Build decode paragraph ──

function buildDecodePara(text, container) {
  const div = document.createElement('div');
  div.className = 'decode-para';

  // Parse bold markers - track which non-space chars are bold
  const boldNonSpace = new Set();
  let clean = '';
  let inBold = false;
  let nsIdx = 0;
  for (let i = 0; i < text.length; i++) {
    if (text[i] === '*' && text[i + 1] === '*') {
      inBold = !inBold;
      i++;
      continue;
    }
    clean += text[i];
    if (text[i] !== ' ') {
      if (inBold) boldNonSpace.add(nsIdx);
      nsIdx++;
    }
  }

  const lines = justify(clean, W);
  const flippable = [];
  let nonSpaceCount = 0;

  lines.forEach((line, li) => {
    for (let c = 0; c < line.length; c++) {
      const ch = line[c];
      const span = document.createElement('span');
      if (ch === ' ') {
        span.textContent = ' ';
      } else {
        span.textContent = ' ';
        span.dataset.final = ch;
        if (boldNonSpace.has(nonSpaceCount)) span.classList.add('bold');
        flippable.push(span);
        nonSpaceCount++;
      }
      div.appendChild(span);
    }
    if (li < lines.length - 1) {
      div.appendChild(document.createTextNode('\n'));
    }
  });

  container.appendChild(div);
  return flippable;
}

// Build from pre-justified lines (for figure paragraphs)
function buildDecodeFromLines(lines, container) {
  const div = document.createElement('div');
  div.className = 'decode-para';
  const flippable = [];

  lines.forEach((line, li) => {
    for (let ci = 0; ci < line.length; ci++) {
      const ch = line[ci];
      const span = document.createElement('span');
      if (ch === ' ') {
        span.textContent = ' ';
      } else {
        span.textContent = ' ';
        span.dataset.final = ch;
        flippable.push(span);
      }
      div.appendChild(span);
    }
    if (li < lines.length - 1) div.appendChild(document.createTextNode('\n'));
  });

  container.appendChild(div);
  return flippable;
}

// ── Decode animation (blank → gibberish → final) ──

function decodeSpans(flippable, delay) {
  const order = [...Array(flippable.length).keys()];
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }

  // Phase 1: fill in gibberish from blank
  const FILL_DURATION = 800;
  const fillPer = FILL_DURATION / order.length;

  order.forEach((oi, seq) => {
    const span = flippable[oi];
    setTimeout(() => { span.textContent = rc(); }, delay + seq * fillPer);
  });

  // Phase 2: decode gibberish to final (re-shuffle for variety)
  const order2 = [...Array(flippable.length).keys()];
  for (let i = order2.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order2[i], order2[j]] = [order2[j], order2[i]];
  }

  const decodeStart = delay + FILL_DURATION + 200;
  const DECODE_DURATION = 1700;
  const decodePer = DECODE_DURATION / order2.length;

  order2.forEach((oi, seq) => {
    const span = flippable[oi];
    const t = decodeStart + seq * decodePer;
    setTimeout(() => { span.textContent = rc(); }, t);
    setTimeout(() => { span.textContent = rc(); }, t + 100);
    setTimeout(() => { span.textContent = rc(); }, t + 200);
    setTimeout(() => { span.textContent = rc(); }, t + 300);
    setTimeout(() => { span.textContent = span.dataset.final; }, t + 400);
  });

  return decodeStart + DECODE_DURATION + 400;
}

// ── Hover corruption ──

function addCorruption(container) {
  container.querySelectorAll('.decode-para').forEach(block => {
    block.addEventListener('mousemove', (e) => {
      const el = document.elementFromPoint(e.clientX, e.clientY);
      if (!el || !el.dataset || !el.dataset.final) return;
      if (el.dataset.corrupting) return;
      el.dataset.corrupting = '1';
      const nearby = [el];
      const prev = el.previousElementSibling;
      const next = el.nextElementSibling;
      if (prev?.dataset?.final && !prev.dataset.corrupting && Math.random() > 0.4) nearby.push(prev);
      if (next?.dataset?.final && !next.dataset.corrupting && Math.random() > 0.4) nearby.push(next);
      nearby.forEach(span => {
        if (span !== el) span.dataset.corrupting = '1';
        const orig = span.dataset.final;
        span.textContent = rc();
        setTimeout(() => { span.textContent = rc(); }, 80);
        setTimeout(() => { span.textContent = orig; delete span.dataset.corrupting; }, 180);
      });
    });
  });
}

// ── Build nav tail ──

function buildTail(container, activePage) {
  const tail = document.createElement('div');
  tail.className = 'tail';
  tail.innerHTML = `
    <div class="tail-rule"></div>
    <div class="tail-links">
      <a data-page="home" class="${activePage === 'home' ? 'active' : ''}">The Revive Project</a>
      <a data-page="romeyka" class="${activePage === 'romeyka' ? 'active' : ''}">Revive-Romeyka</a>
      <a data-page="writing" class="${activePage === 'writing' ? 'active' : ''}">Writing</a>
      <a data-page="research" class="${activePage === 'research' ? 'active' : ''}">Research</a>
      <a data-page="gallery" class="${activePage === 'gallery' ? 'active' : ''}">Gallery</a>
    </div>
  `;
  container.appendChild(tail);

  tail.querySelectorAll('[data-page]').forEach(a => {
    a.addEventListener('click', () => {
      const target = a.dataset.page;
      if (target === currentPage || transitioning) return;
      navigateTo(target);
    });
  });

  return tail;
}

// ── Encode out (scramble to nothing) ──

function encodeOut(callback) {
  const content = document.getElementById('content');
  const allSpans = content.querySelectorAll('.decode-para span[data-final], .post-item, .back-arrow, .placeholder-msg');
  const textSpans = content.querySelectorAll('.decode-para span[data-final]');
  const tail = content.querySelector('.tail');

  // Fade tail immediately
  if (tail) { tail.style.opacity = '0'; tail.style.transition = 'opacity 0.3s'; }

  // Scramble text spans then blank them
  const spanArr = [...textSpans];
  const order = [...Array(spanArr.length).keys()];
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }

  const DURATION = 800;
  const per = DURATION / order.length;

  order.forEach((oi, seq) => {
    const span = spanArr[oi];
    const t = seq * per;
    setTimeout(() => { span.textContent = rc(); }, t);
    setTimeout(() => { span.textContent = rc(); }, t + 60);
    setTimeout(() => { span.textContent = ' '; }, t + 130);
  });

  // Also fade non-decode elements
  content.querySelectorAll('.post-item, .back-arrow, .placeholder-msg').forEach(el => {
    el.style.transition = 'opacity 0.4s';
    el.style.opacity = '0';
  });

  setTimeout(() => {
    content.innerHTML = '';
    content.classList.remove('inner--gallery');
    content.classList.remove('inner--wide');
    callback();
  }, DURATION + 350);
}

// ── Render pages ──

function renderHome(container) {
  const paraTexts = pages.home.paragraphs;
  let endTime = 0;

  paraTexts.forEach((text, i) => {
    const flippable = buildDecodePara(text, container);
    const delay = 400 + i * 900;
    const t = decodeSpans(flippable, delay);
    endTime = Math.max(endTime, t);
  });

  addCorruption(container);
  const tail = buildTail(container, 'home');
  setTimeout(() => tail.classList.add('show'), endTime + 200);
  setTimeout(() => { transitioning = false; }, endTime + 200);
}

function renderWriting(container) {
  const listWrap = document.createElement('div');
  listWrap.style.opacity = '0';
  listWrap.style.transition = 'opacity 0.8s ease';
  listWrap.style.marginTop = '6rem';

  pages.writing.posts.forEach(post => {
    const item = document.createElement('div');
    item.className = 'post-item';
    item.innerHTML = `
      <div class="post-title">${post.title}</div>
    `;
    item.addEventListener('click', () => {
      if (transitioning) return;
      navigateToPost(post.id);
    });
    listWrap.appendChild(item);
  });

  container.appendChild(listWrap);
  setTimeout(() => { listWrap.style.opacity = '1'; }, 400);

  const tail = buildTail(container, 'writing');
  setTimeout(() => {
    tail.classList.add('show');
    transitioning = false;
  }, 800);

  resetPageLayout();
}

function renderPost(container, postId) {
  const post = pages.post[postId];
  if (!post) return;

  // Back arrow
  const back = document.createElement('div');
  back.className = 'back-arrow';
  back.innerHTML = '← Back';
  back.addEventListener('click', () => {
    if (transitioning) return;
    navigateTo('writing');
  });
  container.appendChild(back);
  back.style.opacity = '0';
  back.style.transition = 'opacity 0.6s ease';
  setTimeout(() => { back.style.opacity = '1'; }, 300);

  // Title as decode para
  const titleFlip = buildDecodePara(post.title, container);
  decodeSpans(titleFlip, 300);

  // Spacer
  const spacer = document.createElement('div');
  spacer.style.height = '0.8em';
  container.appendChild(spacer);

  let endTime = 0;
  post.paragraphs.forEach((text, i) => {
    const flippable = buildDecodePara(text, container);
    const delay = 600 + i * 900;
    const t = decodeSpans(flippable, delay);
    endTime = Math.max(endTime, t);
  });

  addCorruption(container);

  const tail = buildTail(container, 'writing');
  setTimeout(() => tail.classList.add('show'), endTime + 200);
  setTimeout(() => { transitioning = false; }, endTime + 200);

}

function renderSimplePage(container, pageKey) {
  const paraTexts = pages[pageKey].paragraphs;
  let endTime = 0;

  paraTexts.forEach((text, i) => {
    const flippable = buildDecodePara(text, container);
    const delay = 400 + i * 900;
    const t = decodeSpans(flippable, delay);
    endTime = Math.max(endTime, t);
  });

  addCorruption(container);
  const tail = buildTail(container, pageKey);
  setTimeout(() => tail.classList.add('show'), endTime + 200);
  setTimeout(() => { transitioning = false; }, endTime + 200);
  resetPageLayout();
}

function renderGallery(container) {
  container.classList.add('inner--gallery');
  const grid = document.createElement('div');
  grid.className = 'gallery-grid';

  // Shuffle and pick 9
  const shuffled = [...pages.gallery.images];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  shuffled.length = 9;

  shuffled.forEach((src, i) => {
    const img = document.createElement('img');
    img.className = 'gallery-img';
    img.src = src;
    img.alt = '';
    img.loading = 'lazy';
    grid.appendChild(img);

    // Staggered fade-in
    setTimeout(() => { img.classList.add('show'); }, 300 + i * 150);
  });

  container.appendChild(grid);

  const tail = buildTail(container, 'gallery');
  setTimeout(() => {
    tail.classList.add('show');
    transitioning = false;
  }, 300 + pages.gallery.images.length * 150 + 400);
}

function resetPageLayout() {
  document.body.style.overflow = '';
  const page = document.querySelector('.page');
  page.style.height = '';
  page.style.minHeight = '';
  page.style.paddingTop = '';
  page.style.paddingBottom = '';
}

// ── Navigation ──

function navigateTo(page) {
  transitioning = true;
  window.scrollTo({ top: 0, behavior: 'instant' });

  if (currentPage === null) {
    // First load, no encode-out needed
    currentPage = page;
    const container = document.getElementById('content');
    renderPage(container, page);
    return;
  }

  currentPage = page;
  encodeOut(() => {
    const container = document.getElementById('content');
    renderPage(container, page);
  });
}

function navigateToPost(postId) {
  transitioning = true;
  window.scrollTo({ top: 0, behavior: 'instant' });
  currentPage = 'post:' + postId;

  encodeOut(() => {
    const container = document.getElementById('content');
    renderPost(container, postId);
  });
}

function renderResearch(container) {
  const listWrap = document.createElement('div');
  listWrap.style.opacity = '0';
  listWrap.style.transition = 'opacity 0.8s ease';
  listWrap.style.marginTop = '6rem';

  const caption = document.createElement('div');
  caption.className = 'research-caption';
  caption.textContent = pages.research.caption;
  listWrap.appendChild(caption);

  pages.research.papers.forEach(paper => {
    const item = document.createElement('div');
    item.className = 'research-item';
    item.innerHTML = paper.title
      + '<div class="research-item-meta">' + paper.authors + ' \u00b7 ' + paper.venue + '</div>';
    listWrap.appendChild(item);
  });

  container.appendChild(listWrap);
  requestAnimationFrame(() => { listWrap.style.opacity = '1'; });

  const tail = buildTail(container, 'research');
  setTimeout(() => { tail.classList.add('show'); transitioning = false; }, 1000);
}

        + '<div class="romeyka-sub"><h3>2.5 Morphophonological processes</h3>'

        + '<div class="romeyka-sub"><h3>4.3 The infinitive</h3>'
        + '<p class="romeyka-p">The preservation of the infinitive is Romeyka\u2019s most celebrated feature. All other Modern Greek varieties have lost it. In Romeyka, the infinitive appears in complementation with <em>prin</em> \u2018before\u2019:</p>'

        + '<p class="romeyka-p">Preverbal particles: <em>na</em> (modal/subjunctive), <em>as</em> (hortative \u2018let us\u2019), <em>\u03b8el</em> (volitive \u2018want\u2019). The particle <em>ba</em> ~ <em>pa(l)</em> marks contrastive topics.</p>'

        + '<div class="romeyka-sub"><h3>4.5 Negation</h3>'
        + '<p class="romeyka-p">Three strategies: <strong>(i)</strong> <em>ut\u0161</em> \u2014 standard clausal negator; <strong>(ii)</strong> <em>mi</em> \u2014 prohibitive/irrealis; <strong>(iii)</strong> <em>jok</em> \u2014 existential negator (< Turkish <em>yok</em>).</p>'

        + gloss('5b',['jane   ha\u00f0a   so      mehele         jok','well   here   to.DEF  neighbourhood  NEG.EXIST'],'Well, here in the neighbourhood there was no school.','')+'</div>'

    {

      body: '<div class="romeyka-sub"><h3>5.1 Basic word order</h3>'
        + '<p class="romeyka-p">Underlying word order is SVO (head-initial), despite surface SOV variation. All-focus contexts yield SVO:</p>'

        + '<p class="romeyka-p">The additive particle <em>dz(e)</em> \u2018also\u2019 follows the finite verb, demonstrating V-to-T raising:</p>'

        + '<p class="romeyka-p"><strong>Focus:</strong> Both information and contrastive focus occupy a single position: immediately preverbal, with strict adjacency.</p>'

        + '<p class="romeyka-p">The rigid hierarchy <strong>Topic > Focus > Verb</strong> is obligatory. This preverbal focus collapse is shared with Turkish \u2014 partial convergence through centuries of contact.</p></div>'
        + '<div class="romeyka-sub"><h3>5.5 Relative clauses</h3>'
        + gloss('17',['evrane    t     opsar\u00e6     p=efere               i     mana','find.3PL.PST  DEF.PL fish.ACC.PL  REL=bring.3SG.PST     DEF.F mother'],'They found the fish that the mother brought.','')+'</div>'
        + '<div class="romeyka-sub"><h3>5.7 Prepositions</h3>'
        + tbl(['Form','Function','Example'],
          [['<em>so</em> ~ <em>s</em> ~ <em>sin</em>','Locative/Goal \u2018to, in, at\u2019','<em>so spidi</em> \u2018to the house\u2019'],
           ['<em>me</em> ~ <em>mo</em>','Instrumental \u2018with\u2019','<em>me din araba</em> \u2018with the car\u2019'],
           ['<em>aso</em> ~ <em>asa</em>','Ablative \u2018from\u2019','<em>aso spidi</em> \u2018from the house\u2019'],
           ['<em>omo</em>','Comparative \u2018like\u2019','<em>omo \u0263ar\u00f0elja</em> \u2018like children\u2019']])+'</div>'
    },
    {
      num: '6', label: 'Lexicon',
      body: '<div class="romeyka-sub"><h3>6.1 Turkish contact layer</h3>'
        + '<p class="romeyka-p">Turkish loanwords are pervasive. Discourse markers show the deepest integration: <em>jane</em> \u2018well\u2019, <em>ondan sora</em> \u2018after that\u2019, <em>ama</em> \u2018but\u2019, <em>i\u015fte</em> \u2018behold\u2019. The Turkish existential negator <em>jok</em> has been borrowed into the negation system.</p>'
        + '<p class="romeyka-p">The borrowing hierarchy: discourse markers (deepest) \u2192 institutional terms \u2192 infrastructure \u2192 core vocabulary (predominantly Greek).</p></div>'
        + '<div class="romeyka-sub"><h3>6.2 Retained Greek core vocabulary</h3>'
        + tbl(['Romeyka','Gloss','Greek etymon'],
          [['<em>spidi</em> ~ <em>spid\u00e6</em>','\u2018house(s)\u2019','\u03c3\u03c0\u03af\u03c4\u03b9'],['<em>nero</em>','\u2018water\u2019','\u03bd\u03b5\u03c1\u03cc'],
           ['<em>psomi</em>','\u2018bread\u2019','\u03c8\u03c9\u03bc\u03af'],['<em>xorafe</em>','\u2018field(s)\u2019','\u03c7\u03c9\u03c1\u03ac\u03c6\u03b9'],
           ['<em>opsar\u00e6</em>','\u2018fish(es)\u2019','\u1f40\u03c8\u03ac\u03c1\u03b9\u03bf\u03bd'],['<em>mana</em>','\u2018mother\u2019','\u03bc\u03ac\u03bd\u03b1'],
           ['<em>\u0161er</em>','\u2018hand\u2019','\u03c7\u03b5\u03af\u03c1']])+'</div>'
    },
    {
      num: '7', label: 'Text sample',
      body: '<p class="romeyka-p">Naturalistic excerpts from the Of/Caykara region:</p>'
        + gloss('18',['eskiden      beri     a\u00f0at\u0161es    emis      ja\u0161aevume','in.old.times since    here       1PL.NOM   live.1PL.PRS'],'Since old times we live here.','')
        + gloss('19',['ta        xorafe     muna       to        spid\u00e6      muna','DEF.PL    field.PL   1PL.POSS   DEF.N     house.PL   1PL.POSS','ula    a\u00f0at\u0161es    ine','all    here       be.3PL.PRS'],'Our fields, our houses are all here.','')
        + gloss('20',['emistine   \u00f0romo   ut\u0161   ixame','1PL        road.ACC  NEG   have.1PL.PST'],'We did not have a road.','')
        + gloss('21',['ula    me     ta        ra\u0161es        ta        \u0263omare      ekovalename','all    with   DEF.PL    pannier.PL   DEF.PL    load.PL     carry.1PL.PST'],'We always carried loads with the panniers.','')
        + gloss('22',['har    ula    me    din    araba','now    all    with  DEF.F  car.ACC'],'Now everything is by car.','')
    },
    {
      num: '8', label: 'Typological profile',
      body: '<p class="romeyka-p">How Romeyka compares to Standard Modern Greek:</p>'
        + '<div class="typo-grid">'
        + '<div class="typo-cell"><div class="typo-label">Feature</div></div>'
        + '<div class="typo-cell"><div class="typo-label">Romeyka</div></div>'
        + '<div class="typo-cell"><div class="typo-label">SMG</div></div></div>'
        + [['Word order','SVO (underlying)','SVO'],['Case system','3 (NOM/ACC/GEN)','3\u20134'],
           ['Gender','3 (M/F/N)','3 (M/F/N)'],['Infinitive','Yes (unique!)','No'],
           ['Focus position','Preverbal (strict)','Postverbal'],['Negation','Preverbal + <em>jok</em>','Preverbal']]
          .map(r => '<div class="typo-grid">'
            + '<div class="typo-cell"><div class="typo-val" style="font-size:9px;color:var(--faint)">' + r[0] + '</div></div>'
            + '<div class="typo-cell' + (r[1].includes('unique') ? ' highlight' : '') + '"><div class="typo-val">' + r[1] + '</div></div>'
            + '<div class="typo-cell"><div class="typo-val">' + r[2] + '</div></div></div>').join('')
    }
  ];

  // Build left nav
  let navHtml = '';
  sections.forEach((sec, i) => {
    navHtml += '<div class="romeyka-nav-item' + (i === 0 ? ' active' : '') + '" data-idx="' + i + '">'
      + '<span class="nav-num">' + sec.num + '</span> ' + sec.label + '</div>';
  });

  wrap.innerHTML = '<div class="romeyka-header">'
    + '<h1>Revive \u2014 Romeyka</h1>'
    + '<div class="subtitle">The Revive Project, the Romeyka community, and AI together decoded and documented the language and recorded oral histories to preserve the language and culture.</div>'
    + '</div>'
    + '<div class="romeyka-layout">'
    + '<nav class="romeyka-nav">' + navHtml + '<div class="romeyka-nav-rule"></div></nav>'
    + '<div class="romeyka-content"><div class="romeyka-content-inner">'
    + '<div class="romeyka-sec-title">' + sections[0].label + '</div>'
    + sections[0].body
    + '</div></div>'
    + '</div>';

  container.appendChild(wrap);

  // Section switching with mini decode effect
  const contentInner = wrap.querySelector('.romeyka-content-inner');
  const navItems = wrap.querySelectorAll('.romeyka-nav-item');
  let activeIdx = 0;
  const scrambleChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789\u03b1\u03b2\u03b3\u03b4\u03b5\u03b6\u03b7\u03b8\u03b9\u03ba\u03bb\u03bc';
  const rc2 = () => scrambleChars[Math.floor(Math.random() * scrambleChars.length)];

  function switchSection(idx) {
    if (idx === activeIdx) return;
    activeIdx = idx;
    navItems.forEach((n, i) => n.classList.toggle('active', i === idx));

    // Scramble out
    contentInner.style.opacity = '0';
    setTimeout(() => {
      // Brief scramble overlay
      const sec = sections[idx];
      const scrambleDiv = document.createElement('div');
      scrambleDiv.style.cssText = 'font-family:var(--mono);font-size:11px;line-height:1.95;color:var(--ghost);font-weight:300;white-space:pre-wrap;';
      let scramble = '';
      const len = 80 + Math.floor(Math.random() * 120);
      for (let c = 0; c < len; c++) scramble += (Math.random() > 0.2 ? rc2() : ' ');
      scrambleDiv.textContent = scramble;
      contentInner.innerHTML = '';
      contentInner.appendChild(scrambleDiv);
      contentInner.style.opacity = '1';

      // Reveal real content
      setTimeout(() => {
        contentInner.style.opacity = '0';
        setTimeout(() => {
          contentInner.innerHTML = '<div class="romeyka-sec-title">' + sec.label + '</div>' + sec.body;
          contentInner.style.opacity = '1';
          // Scroll content to top
          wrap.querySelector('.romeyka-content').scrollTop = 0;
        }, 120);
      }, 200);
    }, 150);
  }

  navItems.forEach((item, i) => {
    item.addEventListener('click', () => switchSection(i));
  });

  // Widen and allow scrolling
  document.body.style.overflow = 'auto';
  container.classList.add('inner--wide');

  const tail = buildTail(container, 'romeyka');
  requestAnimationFrame(() => {
    wrap.style.opacity = '1';
    setTimeout(() => {
      tail.classList.add('show');
      transitioning = false;
    }, 600);
  });
}

function renderPage(container, page) {
  switch (page) {
    case 'home': renderHome(container); break;
    case 'writing': renderWriting(container); break;
    case 'research': renderResearch(container); break;
    case 'gallery': renderGallery(container); break;
    case 'romeyka': renderRomeyka(container); break;
    default: renderHome(container);
  }
}

// ── Init ──
navigateTo('home');
</script>

</body>
</html>
